version: 2

builds:
  - main: ./cmd/coldkey
    binary: coldkey
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - repository:
      owner: pike00
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: coldkey
    homepage: "https://github.com/pike00/coldkey"
    description: "Post-quantum age key generation and paper backup tool"
    license: "MIT"
    commit_msg_template: "Update coldkey to {{ .Tag }}"

changelog:
  use: github-native
